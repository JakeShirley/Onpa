name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: semantic-release
    runs-on: macos-26
    environment: AppStore

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install release dependencies
        run: npm ci

      - name: Verify Xcode 26 SDK
        run: |
          xcodebuild -version
          sdk_version="$(xcrun --sdk iphoneos --show-sdk-version)"
          echo "iPhoneOS SDK: $sdk_version"
          case "$sdk_version" in
            26.*) ;;
            *)
              echo "::error::Expected iOS 26 SDK or newer for App Store Connect uploads, got $sdk_version"
              exit 1
              ;;
          esac

      - name: Import Apple Distribution certificate
        uses: apple-actions/import-codesign-certs@v7
        with:
          p12-file-base64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}

      - name: Download App Store provisioning profile
        uses: apple-actions/download-provisioning-profiles@v6
        with:
          bundle-id: |
            org.odinseye.onpa
            org.odinseye.onpa.OnpaWidget
          profile-type: IOS_APP_STORE
          issuer-id: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          api-key-id: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          api-private-key: ${{ secrets.APP_STORE_CONNECT_API_PRIVATE_KEY }}

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run release || true

      - name: Get release notes
        id: release-notes
        run: |
          notes=""
          notes_file="build/TestFlight/release-notes.md"
          if [[ -f "$notes_file" && -f build/TestFlight/export/Onpa.ipa ]]; then
            notes="$(cat "$notes_file")"
            # TestFlight "What to Test" has a 4000 character limit.
            if [[ ${#notes} -gt 4000 ]]; then
              notes="${notes:0:3997}..."
            fi
          fi
          {
            echo "notes<<RELEASE_NOTES_EOF"
            echo "$notes"
            echo "RELEASE_NOTES_EOF"
          } >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Upload app to Test Flight
        if: ${{ hashFiles('build/TestFlight/export/Onpa.ipa') != '' }}
        uses: apple-actions/upload-testflight-build@v5
        with:
          app-path: build/TestFlight/export/Onpa.ipa
          issuer-id: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          api-key-id: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          api-private-key: ${{ secrets.APP_STORE_CONNECT_API_PRIVATE_KEY }}
          uses-non-exempt-encryption: "false"
          wait-for-processing: "true"
          release-notes: ${{ steps.release-notes.outputs.notes }}
